services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: autorecon
      POSTGRES_USER: autorecon_user
      POSTGRES_PASSWORD: autorecon123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autorecon_user -d autorecon"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://autorecon_user:autorecon123@db:5432/autorecon
      - HIBP_API_KEY=${HIBP_API_KEY}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/reports:/app/reports

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: